<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demon Slayer Showcase | Meilan</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>

    <header class="navbar">
        <div class="logo">Zenitsu Agatsuma</div>
        <button id="sound-btn" onclick="startAudio()">🔊 Hidupkan Suara</button>
    </header>

    <audio id="thunder-audio" src="./audio.mp4" loop></audio>

    <main class="showcase">
        <video id="main-video" src="./v1.mp4" autoplay loop muted></video>
        
        <div class="overlay-gradient"></div>

        <div class="showcase-content">
            <h1 id="main-title">Thunder Breathing</h1>
            <p id="main-desc">Konsentrasi penuh! Zenitsu melepaskan aura petir yang luar biasa sebelum menyerang.</p>
        </div>
    </main>

    <section class="bottom-section">
        <div class="thumbnails">
            <video src="./v1.mp4" autoplay loop muted class="thumb active" onclick="changeShowcase(this, './v1.mp4', 'Thunder Breathing', 'Konsentrasi penuh! Zenitsu melepaskan aura petir yang luar biasa sebelum menyerang.')"></video>
            
            <video src="./v2.mp4" autoplay loop muted class="thumb" onclick="changeShowcase(this, './v2.mp4', 'Jigoro Kuwajima', 'Meskipun keras, sang kakek sekaligus guru ini selalu menyayangi dan percaya pada potensi tersembunyi Zenitsu.')"></video>
            
            <video src="./v3.mp4" autoplay loop muted class="thumb" onclick="changeShowcase(this, './v3.mp4', 'Flaming Thunder God', 'Bentuk ketujuh Pernapasan Petir. Teknik luar biasa yang diciptakan sendiri oleh Zenitsu.')"></video>
            
            <video src="./v4.mp4" autoplay loop muted class="thumb" onclick="changeShowcase(this, './v4.mp4', 'Lightning Nichirin', 'Pedang Nichirin yang memancarkan kilat kuning menyala, siap membelah kegelapan malam.')"></video>
        </div>

        <div class="assignment-box">
            <div id="tanggal" class="date-text"></div>
            <div class="btn-group">
                <button onclick="tampil()">Try it</button>
                <button onclick="show()">Kenalan Yuk</button>
            </div>
        </div>
    </section>

    <div id="video-modal">
        <button class="close-btn" onclick="closeVideo()">X Tutup</button>
        <video id="special-video" src="./v-special.mp4" controls></video>
    </div>

    <script>
        alert("Selamat datang di web Demon Slayer karya Meilan!");
    </script>

    <script src="./script.js"></script>

</body>
</html>
